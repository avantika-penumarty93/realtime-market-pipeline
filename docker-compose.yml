version: "3.9"

# ── Infrastructure ─────────────────────────────────────────────────────────────

services:
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy: *true'"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Creates topics with explicit partition + retention settings before
  # the ingester and processor start — avoids auto-create races.
  redpanda-init:
    image: redpandadata/redpanda:latest
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "rpk topic create trades --partitions 3 --replicas 1
         -c retention.ms=86400000 -X brokers=redpanda:9092 &&
       rpk topic create dead-letter --partitions 1 --replicas 1
         -c retention.ms=604800000 -X brokers=redpanda:9092"
    restart: on-failure

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: marketdata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketdata"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

# ── Application services ───────────────────────────────────────────────────────

  ingester:
    build:
      context: ./ingester
      dockerfile: Dockerfile
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: redpanda:9092
    restart: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: redpanda:9092
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/marketdata
    restart: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/marketdata
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/marketdata
      API_URL: http://api:8000
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  timescale_data:
